services:
  - type: web
    name: codemind-ai
    runtime: node
    plan: free
    buildCommand: "npm install -g pnpm && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/ai-coder run build && pnpm --filter @workspace/api-server run build"
    startCommand: "node artifacts/api-server/dist/index.mjs"
    envVars:
      - key: NODE_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: codemind-ai-db
          property: connectionString

databases:
  - name: codemind-ai-db
    plan: free
