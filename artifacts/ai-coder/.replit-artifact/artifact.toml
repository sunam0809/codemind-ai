kind = "web"
previewPath = "/"
title = "AI 코딩 어시스턴트"
version = "1.0.0"
id = "artifacts/ai-coder"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24043

[services.development]
run = "pnpm --filter @workspace/ai-coder run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-coder", "run", "build" ]
publicDir = "artifacts/ai-coder/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24043"
BASE_PATH = "/"
